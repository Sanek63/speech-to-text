services:
  backend:
    build: .
    network_mode: host  # bridge/NAT не мог достучаться до Azure CDN (ENETUNREACH) — host обходит его полностью
    volumes:
      - ./data:/app/data
      - model-cache:/root/.cache
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

volumes:
  model-cache:
