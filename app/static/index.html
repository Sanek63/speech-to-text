<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Транскрипция и диаризация</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div id="drop-overlay" class="drop-overlay hidden">
    <div class="drop-overlay-text">Отпустите файл для загрузки</div>
  </div>

  <main class="page">
    <h1>Транскрипция и диаризация</h1>

    <section class="upload-panel">
      <input type="file" id="file-input" accept="audio/*,video/*" multiple>
      <button id="upload-btn">Загрузить</button>
      <span id="upload-status" class="status-text"></span>
      <div id="upload-progress" class="upload-progress hidden">
        <div id="upload-progress-bar" class="upload-progress-bar"></div>
      </div>
    </section>

    <section class="jobs-panel">
      <div id="jobs-list" class="jobs-list"></div>
      <div class="jobs-pagination">
        <button id="jobs-prev" disabled>&larr; Назад</button>
        <span id="jobs-page-info" class="status-text"></span>
        <button id="jobs-next" disabled>Вперёд &rarr;</button>
      </div>
    </section>

    <section id="error-panel" class="error-panel hidden"></section>
  </main>

  <script src="/app.js"></script>
</body>
</html>
